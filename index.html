<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Catálogo comercial Herbora — Herramienta para comerciales y clientes profesionales">
  <meta name="theme-color" content="#0E6270">
  <meta name="color-scheme" content="light">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Herbora">
  <meta name="mobile-web-app-capable" content="yes">
  <meta property="og:title" content="Herbora Sales App">
  <meta property="og:description" content="Catálogo comercial Herbora">
  <meta property="og:type" content="website">

  <title>Herbora Sales App</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/screens.css">
  <link rel="stylesheet" href="./css/animations.css">

  <style>
    /* Splash mientras carga */
    #app-loading {
      position: fixed; inset: 0;
      background: #0E6270;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #app-loading.hidden { opacity: 0; pointer-events: none; }
    #app-loading .splash-logo { width: 180px; height: auto; }
    #app-loading .dot-pulse { display: flex; gap: 6px; }
    #app-loading .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); animation: dotPulse 1.2s ease infinite; }
    #app-loading .dot:nth-child(2) { animation-delay: 0.2s; }
    #app-loading .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
  </style>
</head>

<body>

  <!-- Splash de carga -->
  <div id="app-loading" role="status" aria-live="polite">
    <img class="splash-logo" src="./assets/logo/herbora-logo-blanco.svg" alt="Herbora" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span style="display:none;font-size:32px;font-weight:700;color:white;font-family:sans-serif;letter-spacing:-1px;">herbora</span>
    <div class="dot-pulse">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- App shell -->
  <div id="app">

    <!-- Banner offline -->
    <div id="offline-banner" role="alert">📡 Sin conexión — usando catálogo guardado</div>

    <!-- Barra superior: logo Herbora + botón Inicio (visible tras entrar en cualquier modo) -->
    <header id="app-topbar" role="banner" aria-label="Barra superior">
      <div class="topbar-inner">
        <img
          class="topbar-logo"
          src="./assets/logo/herbora-logo-blanco.svg"
          alt="Herbora"
          onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span style=\'font-size:18px;font-weight:700;color:white;letter-spacing:-0.5px;\'>herbora</span>')"
        >
        <button class="topbar-home-btn" id="btn-home" aria-label="Volver al inicio" title="Inicio">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 12L12 3L21 12V21H15V15H9V21H3V12Z" stroke="white" stroke-width="2" stroke-linejoin="round" fill="none"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Contenedor de pantallas (position:absolute, cada una ocupa todo el espacio) -->
    <div id="screen-container">

      <!-- Bienvenida / elección de modo -->
      <div id="screen-entry"        class="screen" role="main"></div>
      <!-- Autenticación empleado -->
      <div id="screen-auth"         class="screen" role="main"></div>
      <!-- Dashboard / Resumen -->
      <div id="screen-dashboard"    class="screen" role="main"></div>
      <!-- Catálogo (pantalla principal) -->
      <div id="screen-catalog"      class="screen" role="main"></div>
      <!-- Marcas -->
      <div id="screen-brands"       class="screen" role="main"></div>
      <!-- Ficha de producto -->
      <div id="screen-product"      class="screen" role="main"></div>
      <!-- Listado / Pedido -->
      <div id="screen-order"        class="screen" role="main"></div>
      <!-- Favoritos -->
      <div id="screen-favorites"    class="screen" role="main"></div>
      <!-- Historial -->
      <div id="screen-history"      class="screen" role="main"></div>
      <!-- Comparador -->
      <div id="screen-compare"      class="screen" role="main"></div>
      <!-- Modo presentación -->
      <div id="screen-presentation" class="screen" role="main"></div>
      <!-- Más / Ajustes -->
      <div id="screen-more"         class="screen" role="main"></div>
      <!-- Panel de gestión de productos — solo modo empleado -->
      <div id="screen-admin"        class="screen" role="main"></div>

    </div>

    <!-- Navbar inferior -->
    <nav id="app-navbar" role="navigation" aria-label="Navegación principal"></nav>

    <!-- Toast container -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  </div>

  <script type="module" src="./js/app.js"></script>

  <script>
    window._hideSplash = function() {
      const splash = document.getElementById('app-loading');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 350);
      }
    };
    setTimeout(() => window._hideSplash?.(), 4000);
  </script>

</body>
</html>
